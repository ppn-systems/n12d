name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/Nalix.Observability.sln

      - name: Build
        run: dotnet build src/Nalix.Observability.sln --configuration Release --no-restore

      - name: Publish dashboard
        run: dotnet publish src/Nalix.Dashboard/Nalix.Dashboard.csproj --configuration Release --no-build --output artifacts/dashboard

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          pages_root="artifacts/dashboard/wwwroot"
          base_path="/"

          sed -i "s|<base href=\"/\" />|<base href=\"${base_path}\" />|g" "${pages_root}/index.html"
          cp "${pages_root}/index.html" "${pages_root}/404.html"
          echo "dash.ppn.io.vn" > "${pages_root}/CNAME"
          touch "${pages_root}/.nojekyll"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dashboard/wwwroot

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
