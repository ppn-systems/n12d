name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/Nalix.Observability.sln

      - name: Build
        run: dotnet build src/Nalix.Observability.sln --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path src -Recurse -Filter *.csproj |
            Where-Object {
              $content = Get-Content -Raw -Path $_.FullName
              $content -match '<IsTestProject>\s*true\s*</IsTestProject>' -or
              $content -match 'Microsoft\.NET\.Test\.Sdk'
            }

          if (-not $testProjects) {
            Write-Host "No test projects found under src."
            exit 0
          }

          foreach ($project in $testProjects) {
            dotnet test $project.FullName --configuration Release --no-build --verbosity normal
          }
